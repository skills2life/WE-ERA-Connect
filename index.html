<!doctype html>
<html lang="en">
  <head>
    <script id="fetch-safeguard">
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          
          function getFetch() {
            return currentFetch;
          }
          function setFetch(val) {
            currentFetch = val;
          }

          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: getFetch,
              set: setFetch
            });
          } catch(e) {}

          if (typeof globalThis !== 'undefined') {
            try {
              Object.defineProperty(globalThis, 'fetch', {
                configurable: true,
                enumerable: true,
                get: getFetch,
                set: setFetch
              });
            } catch(e) {}
          }

          if (typeof Window !== 'undefined' && Window.prototype) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                configurable: true,
                enumerable: true,
                get: getFetch,
                set: setFetch
              });
            } catch(e) {}
          }
        } catch (globalError) {
          console.warn("Global fetch safeguard setup error:", globalError);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WE-ERA Connect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
